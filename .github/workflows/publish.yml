name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      # NPM_TOKEN is provisioned, so the publish step runs. The guard remains so
      # that if the secret is ever rotated out or removed, the publish step skips
      # cleanly rather than leaving a perpetually-red post-merge workflow.
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Check if this version is already published
        id: pub
        run: |
          set -euo pipefail
          name=$(node -p "require('./package.json').name")
          ver=$(node -p "require('./package.json').version")
          if npm view "$name@$ver" version >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "$name@$ver is already on npm; skipping publish (idempotent re-dispatch)."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip publish (no NPM_TOKEN configured)
        if: env.HAS_NPM_TOKEN != 'true'
        run: |
          echo "NPM_TOKEN is not configured for this repository."
          echo "Build and tests passed, but nothing was published to npm."
          echo "To enable publishing, add an NPM_TOKEN secret (or configure npm"
          echo "trusted publishing for this repo) and re-run this workflow."

      - name: Publish to npm
        if: steps.pub.outputs.skip == 'false' && env.HAS_NPM_TOKEN == 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
